name: Weekly Digest

on:
  schedule:
    # Friday 08:09 UTC (GMT)
    - cron: "9 8 * * 5"
  workflow_dispatch:

concurrency:
  group: weekly-digest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      BREVO_SENDER_EMAIL: ${{ secrets.BREVO_SENDER_EMAIL }}
      BREVO_SENDER_NAME: ${{ secrets.BREVO_SENDER_NAME }}
      BREVO_LIST_ID: ${{ secrets.BREVO_LIST_ID }}
      AUTO_PROCEED: "1"
      ESTIMATE_FIRST: "1"
      SEND_EMAIL: "1"
      NO_EMAIL: "0"
      EMAIL_PROVIDER: "brevo"
      EMAIL_TO_FILE: ""
      EMAIL_BREVO_LIST_ID: ${{ secrets.BREVO_LIST_ID }}
      MAX_RESULTS: "500"
      LLM_CORE_TOP_N: "15"
      LLM_LITE_TOP_N: "25"
      LLM_BATCH_SIZE: "1"
      LLM_LITE_BATCH_SIZE: "13"
      LLM_BATCH_DELAY_SECONDS: "30"
      LLM_MAX_REQUESTS: "20"
      LLM_MIN_SUCCESS_RATE: "0.0"
      PODCAST_SOURCE: "1"
      PODCAST_PDF: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PDF Tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex perl

      - name: Run Weekly Pipeline
        run: |
          chmod +x scripts/run_weekly_digest.sh scripts/render_pdf.sh
          mkdir -p outputs
          ./scripts/run_weekly_digest.sh 2>&1 | tee outputs/workflow.log

      - name: Upload Outputs Artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: digest-outputs-${{ github.run_id }}
          path: |
            outputs/workflow.log
            outputs/*_digest.md
            outputs/*_digest.pdf
            outputs/*_digest.json
            outputs/*_run_summary.json
            outputs/*_core_podcast_source.md
            outputs/*_core_podcast_source.pdf
