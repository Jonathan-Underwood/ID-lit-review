name: Weekly Digest

on:
  schedule:
    # Friday 07:00 UTC (GMT)
    - cron: "0 7 * * 5"
  workflow_dispatch:

jobs:
  run-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      BREVO_SENDER_EMAIL: ${{ secrets.BREVO_SENDER_EMAIL }}
      BREVO_SENDER_NAME: ${{ secrets.BREVO_SENDER_NAME }}
      EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
      AUTO_PROCEED: "1"
      ESTIMATE_FIRST: "1"
      SEND_EMAIL: "0"
      NO_EMAIL: "1"
      EMAIL_PROVIDER: "brevo"
      EMAIL_TO_FILE: "recipients.txt"
      MAX_RESULTS: "120"
      LLM_CORE_TOP_N: "6"
      LLM_LITE_TOP_N: "0"
      LLM_BATCH_SIZE: "1"
      LLM_LITE_BATCH_SIZE: "1"
      LLM_BATCH_DELAY_SECONDS: "20"
      LLM_MAX_REQUESTS: "8"
      LLM_MIN_SUCCESS_RATE: "0.0"
      PODCAST_SOURCE: "0"
      PODCAST_PDF: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PDF Tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex perl

      - name: Create Recipients File From Secret
        run: |
          if [ -z "${EMAIL_RECIPIENTS}" ]; then
            echo "EMAIL_RECIPIENTS secret is empty." >&2
            exit 1
          fi
          printf "%s\n" "${EMAIL_RECIPIENTS}" > recipients.txt
          echo "Recipient count:"
          grep -Ev '^\s*(#|$)' recipients.txt | wc -l

      - name: Run Weekly Pipeline
        run: |
          chmod +x scripts/run_weekly_digest.sh scripts/render_pdf.sh
          ./scripts/run_weekly_digest.sh 2>&1 | tee outputs/workflow.log

      - name: Upload Outputs Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-outputs-${{ github.run_id }}
          path: |
            outputs/workflow.log
            outputs/*_digest.md
            outputs/*_digest.pdf
            outputs/*_digest.json
            outputs/*_core_podcast_source.md
            outputs/*_core_podcast_source.pdf
