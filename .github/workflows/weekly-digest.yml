name: Weekly Literature Digest

on:
  schedule:
    - cron: "30 6 * * 5"
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate digest
        env:
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 run_digest.py --days 7 --max-results 400 --llm-enrich --llm-top-n 0 --llm-batch-size 5 --llm-batch-delay-seconds 12
      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: weekly-digest
          path: outputs/*
